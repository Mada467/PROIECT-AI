<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameMatch AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-layout">
        <header class="app-header">
            <div class="header-inner">
                <span class="logo">🎮 GameMatch AI</span>
                <span class="header-sub">Asistentul tău pentru orice întrebare despre jocuri</span>
                <a href="favorites.html" class="fav-header-btn">❤️ Favorite</a>
            </div>
        </header>

        <div class="filters-bar">
            <div class="filters-inner">
                <span class="filter-label">🔞 Vârstă:</span>
                <button class="age-btn active" data-age="">Toate</button>
                <button class="age-btn" data-age="1">7+</button>
                <button class="age-btn" data-age="2">12+</button>
                <button class="age-btn" data-age="3">16+</button>
                <button class="age-btn" data-age="4">18+</button>

                <span class="filter-label filter-label-platform">🖥️ Platformă:</span>
                <button class="platform-btn active" data-platform="">Toate</button>
                <button class="platform-btn" data-platform="18">PC</button>
                <button class="platform-btn" data-platform="187">PS5</button>
                <button class="platform-btn" data-platform="186">Xbox Series</button>
                <button class="platform-btn" data-platform="7">Nintendo Switch</button>

                <span class="filter-label filter-label-rating">⭐ Rating:</span>
                <button class="rating-btn active" data-rating="">Toate</button>
                <button class="rating-btn" data-rating="70">70+</button>
                <button class="rating-btn" data-rating="80">80+</button>
                <button class="rating-btn" data-rating="90">90+</button>
            </div>
        </div>

        <main class="chat-area" id="chatArea">
            <div class="welcome-msg">
                <h2>Bună! Sunt GameMatch AI 🎮</h2>
                <p>Întreabă-mă orice despre jocuri video. De exemplu:</p>
                <div class="suggestions">
                    <button class="suggestion-btn" onclick="sendSuggestion(this)">Recomandă un joc asemănător cu CS2</button>
                    <button class="suggestion-btn" onclick="sendSuggestion(this)">Jocuri free pe PS5</button>
                    <button class="suggestion-btn" onclick="sendSuggestion(this)">Cele mai bune jocuri de aventură cu story</button>
                    <button class="suggestion-btn" onclick="sendSuggestion(this)">Jocuri co-op pentru 2 jucători</button>
                </div>
            </div>
        </main>

        <div class="input-area">
            <div class="input-inner">
                <input type="text" id="userInput" placeholder="Întreabă ceva despre jocuri..." />
                <button id="sendBtn" onclick="sendMessage()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
